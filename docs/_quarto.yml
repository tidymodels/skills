project:
  type: website
  output-dir: _site

website:
  title: "Tidymodels skills"
  description: "Claude Code skills for tidymodels package development and analysis"
  favicon: assets/logos/tidymodels.png

  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Getting Started"
        href: getting-started.qmd
      - text: "Users"
        href: users/index.qmd
      - text: "Developers"
        href: developers/index.qmd
    right:
      - icon: github
        href: https://github.com/tidymodels/skills
        aria-label: GitHub

  sidebar:
