      title: "User Skills"
      contents:
        - text: "Overview"
          href: users/index.qmd
        - section: "Tabular Data ML"
          href: users/tabular-data-ml.qmd
          contents:
            - text: "Data Spending"
              href: users/references/data-spending.qmd
            - text: "Resampling"
              href: users/references/resampling.qmd
            - text: "Feature Engineering"
              href: users/references/feature-engineering.qmd
            - text: "Model Tuning"
              href: users/references/tuning.qmd
            - text: "Model Evaluation"
              href: users/references/evaluation.qmd

