theme:
  - cosmo
  - styles.scss

format:
  html:
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    linestretch: 1.6
    grid:
      body-width: 840px
    filters:
      - _extensions/transform-links.lua
