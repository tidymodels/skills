project:
  type: website
  output-dir: _site

website:
  title: "Claude Code Skills"
  description: "Claude Code skills for tidymodels package development and analysis"

  navbar:
    background: primary
    search: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "Getting Started"
        href: getting-started.qmd
      - text: "Users"
        href: users/index.qmd
      - text: "Developers"
        href: developers/index.qmd

  sidebar:
    - id: users
      title: "User Skills"
      contents:
        - text: "Overview"
          href: users/index.qmd
        - section: "Tabular Data ML"
          href: users/tidymodels.qmd
          contents:
            - text: "Data Spending"
              href: users/references/data-spending.qmd
            - text: "Resampling"
              href: users/references/resampling.qmd
            - text: "Feature Engineering"
              href: users/references/feature-engineering.qmd
            - text: "Model Tuning"
              href: users/references/tuning.qmd
            - text: "Model Evaluation"
              href: users/references/evaluation.qmd

    - id: developers
      title: "Developer Skills"
      contents:
        - text: "Overview"
          href: developers/index.qmd
        - section: "Skills"
          contents:
            - text: "Add Yardstick Metric"
              href: developers/add-yardstick-metric.qmd
            - text: "Add Recipe Step"
              href: developers/add-recipe-step.qmd

  page-footer:
    left: "Built with [Quarto](https://quarto.org)"
    right: "Part of the [tidymodels](https://tidymodels.org) ecosystem"

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    filters:
      - _extensions/transform-links.lua
